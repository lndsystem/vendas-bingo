@if (isLoading$ | async) {
  <div class="loading-overlay" aria-live="polite" aria-busy="true">
    <p-progress-spinner
      strokeWidth="6"
      fill="transparent"
      animationDuration=".5s"
      [style]="{ width: '56px', height: '56px' }"
    />
    <span class="loading-overlay-texto">Aguarde...</span>
  </div>
}
